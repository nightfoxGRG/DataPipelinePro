#config.toml
[app]
# Название проекта, отображаемое в заголовке браузера и интерфейсе
project_name = "Конвейер Данных"

[database]
# Параметры подключения к PostgreSQL
host     = "localhost"
port     = 5432
name     = ""
user     = ""
password = ""

[minio]
# S3-совместимое хранилище (MinIO). API-порт docker/minio.yml → 50002.
endpoint       = "localhost:50002"
access_key     = "minioadmin"
secret_key     = "minioadmin"
secure         = false
default_bucket = "data-pipeline"

[translation]
# URL of the LibreTranslate service used to translate Cyrillic column headers
# to English SQL identifiers. Change this value before starting the application
# if the service is running on a different host or port.
libretranslate_url = "http://127.0.0.1:50001"
# API key required if LibreTranslate is started with --api-keys flag.
# Leave empty if the service allows unauthenticated access.
api_key = ""
