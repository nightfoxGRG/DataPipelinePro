<div class="mode-badge mode-badge--{{ run_mode }}">
  {% if run_mode == 'local' %}локальный режим{% else %}серверный режим{% endif %}
</div>
{% if current_user %}
<div class="content-badges">
  <div class="db-badge"{% if current_user.db_label %} data-tooltip="postgresql://{{ current_user.db_host }}:{{ current_user.db_port }}/{{ current_user.db_name }}"{% endif %}>БД: {{ current_user.db_label or 'не задана' }}</div>
  <div class="project-badge"{% if current_user.project_description %} data-tooltip="{{ current_user.project_description }}"{% endif %}>Проект: {{ current_user.project_schema or 'не задана' }}</div>
</div>
{% endif %}

{% include '_errors.html' %}
