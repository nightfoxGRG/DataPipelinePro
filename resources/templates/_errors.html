<div id="toast-container" class="toast-container">
  <button id="toast-close-all" class="toast-close-all" onclick="closeAllToasts()" style="display:none">закрыть все</button>
</div>

<div id="error-modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeErrorModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Ошибки</h2>
      <button type="button" class="modal-close" onclick="closeErrorModal()">&#x2715;</button>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body" style="overflow-y:auto;max-height:400px">
      <ul class="error-modal-list" id="error-modal-list"></ul>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-modal-primary" onclick="closeErrorModal()">Закрыть</button>
    </div>
  </div>
</div>

<script>
  function showErrors(errors) {
    if (!errors || !errors.length) return;
    if (errors.length > 3) {
      _showErrorModal(errors);
    } else {
      errors.forEach(_addToast);
      _updateCloseAll();
    }
  }

  function _addToast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';

    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'toast-close';
    closeBtn.textContent = '×';
    closeBtn.onclick = function () { toast.remove(); _updateCloseAll(); };

    const body = document.createElement('div');
    body.className = 'toast-body';

    const icon = document.createElement('span');
    icon.className = 'toast-icon';
    icon.textContent = '!';

    const msgEl = document.createElement('span');
    msgEl.className = 'toast-message';
    msgEl.textContent = msg;

    body.append(icon, msgEl);
    toast.append(closeBtn, body);
    container.appendChild(toast);
  }

  function _updateCloseAll() {
    const count = document.querySelectorAll('#toast-container .toast').length;
    document.getElementById('toast-close-all').style.display = count > 1 ? 'block' : 'none';
  }

  function closeAllToasts() {
    document.querySelectorAll('#toast-container .toast').forEach(function (t) { t.remove(); });
    _updateCloseAll();
  }

  function _showErrorModal(errors) {
    const list = document.getElementById('error-modal-list');
    list.innerHTML = '';
    errors.forEach(function (msg) {
      const li = document.createElement('li');
      li.className = 'error-modal-item';

      const icon = document.createElement('span');
      icon.className = 'toast-icon';
      icon.textContent = '!';

      const text = document.createElement('span');
      text.textContent = msg;

      li.append(icon, text);
      list.appendChild(li);
    });
    document.getElementById('error-modal-overlay').style.display = 'flex';
  }

  function closeErrorModal() {
    document.getElementById('error-modal-overlay').style.display = 'none';
  }
</script>
