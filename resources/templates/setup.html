<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ project_name }} — Настройка</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="mode-{{ run_mode }}">
    {% include '_errors.html' %}

    <div class="content" style="max-width:560px;margin:40px auto">
      <h1>Первый запуск</h1>
      <hr class="section-divider">

      <p class="hint">
        Укажите параметры подключения к локальной базе данных PostgreSQL.
        Файл конфигурации будет сохранён по пути:<br>
        <code style="font-size:12px;color:#5f6368">{{ config_path }}</code>
      </p>

      <p class="hint" style="margin-top:8px">
        После сохранения будут применены миграции и приложение откроется на главной странице.
      </p>

      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Хост</label>
        <input id="db-host" type="text" class="form-input" value="localhost" readonly
               style="background:#f1f3f4;color:#5f6368;cursor:default">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Порт</label>
        <input id="db-port" type="number" class="form-input" value="{{ defaults.port }}" placeholder="5432" min="1" max="65535" style="width:160px">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Имя базы данных</label>
        <input id="db-name" type="text" class="form-input" value="{{ defaults.name }}" placeholder="data_pipeline_pro">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Схема (системные таблицы)</label>
        <input id="db-schema" type="text" class="form-input" value="{{ defaults.schema }}" placeholder="data_pipline_schema">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Пользователь</label>
        <input id="db-user" type="text" class="form-input" value="{{ defaults.user }}" placeholder="postgres">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Пароль</label>
        <input id="db-password" type="password" class="form-input" value="{{ defaults.password }}" placeholder="">
      </div>

      <hr class="section-divider" style="margin-top:24px">

      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">LibreTranslate URL</label>
        <input id="lt-url" type="text" class="form-input" value="{{ defaults.libretranslate_url }}" placeholder="http://127.0.0.1:50001">
      </div>
      <div class="form-group">
        <label class="form-label">LibreTranslate API-ключ <span style="font-weight:normal;color:#888">(если нужен)</span></label>
        <input id="lt-key" type="text" class="form-input" value="{{ defaults.libretranslate_api_key }}" placeholder="">
      </div>

      <div style="display:flex;gap:10px;align-items:center;margin-top:24px">
        <button type="button" style="margin-top:0" onclick="testConnection()">Проверить подключение</button>
        <button type="button" class="btn-modal-primary" style="flex:none;width:auto" onclick="saveAndStart()">Сохранить и запустить</button>
        <span id="status-msg" style="font-size:13px;color:#5f6368"></span>
      </div>

      <div id="spinner" class="spinner" style="display:none;margin-top:16px">
        <span class="spinner-icon"></span> <span id="spinner-text">Сохранение…</span>
      </div>
    </div>

    <script>
      function _payload() {
        return {
          database: {
            host: document.getElementById('db-host').value.trim(),
            port: parseInt(document.getElementById('db-port').value) || 5432,
            name: document.getElementById('db-name').value.trim(),
            schema: document.getElementById('db-schema').value.trim(),
            user: document.getElementById('db-user').value.trim(),
            password: document.getElementById('db-password').value,
          },
          translation: {
            libretranslate_url: document.getElementById('lt-url').value.trim(),
            api_key: document.getElementById('lt-key').value.trim(),
          },
        };
      }

      function _setStatus(text, ok) {
        var el = document.getElementById('status-msg');
        el.textContent = text;
        el.style.color = ok ? '#2e7d32' : '#c62828';
      }

      async function testConnection() {
        closeAllToasts();
        _setStatus('', true);
        document.getElementById('spinner-text').textContent = 'Проверка…';
        document.getElementById('spinner').style.display = 'flex';
        try {
          var resp = await fetch('{{ url_for("setup_test") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(_payload()),
          });
          var data = await resp.json();
          if (!resp.ok || data.errors) { showErrors(data.errors || ['Ошибка проверки']); _setStatus('', true); return; }
          _setStatus('Подключение успешно.', true);
        } catch (e) {
          showErrors(['Ошибка соединения: ' + e.message]);
        } finally {
          document.getElementById('spinner').style.display = 'none';
        }
      }

      async function saveAndStart() {
        closeAllToasts();
        _setStatus('', true);
        document.getElementById('spinner-text').textContent = 'Сохранение и миграции…';
        document.getElementById('spinner').style.display = 'flex';
        try {
          var resp = await fetch('{{ url_for("setup_save") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(_payload()),
          });
          var data = await resp.json();
          if (!resp.ok || data.errors) { showErrors(data.errors || ['Ошибка сохранения']); return; }
          window.location.href = data.redirect || '/';
        } catch (e) {
          showErrors(['Ошибка соединения: ' + e.message]);
        } finally {
          document.getElementById('spinner').style.display = 'none';
        }
      }
    </script>
  </body>
</html>
